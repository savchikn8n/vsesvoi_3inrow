<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Match-3 Gold Mine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="frame">
      <header class="hud">
        <div class="panel">
          <span class="label">Счёт</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="brand" aria-label="Логотип">
          <img src="./assets/logoup.png" alt="Logo" />
        </div>
        <div class="panel">
          <span class="label">Таймер</span>
          <span id="timer" class="value">7</span>
        </div>
      </header>

      <section class="board-wrap">
        <div id="board" class="board" aria-label="Игровое поле"></div>
        <div id="effects-layer" class="effects-layer" aria-hidden="true"></div>
      </section>

      <footer class="controls">
        <div class="control-row">
          <button id="restart" type="button">Новая игра</button>
          <button id="exit-to-menu" class="exit-to-menu" type="button">Выйти</button>
        </div>
        <p id="status" class="status-hidden" aria-live="polite">Собирайте комбинации по 3+ в ряд.</p>
      </footer>

      <section id="start-screen" class="start-screen" aria-label="Стартовый экран">
        <div class="start-card">
        <div class="start-top">
          <div class="start-record panel">
            <span class="start-record-label">Мой рекорд</span>
            <span id="best-score" class="start-record-value">0</span>
          </div>
        </div>

        <div class="start-actions">
          <button id="start-new-game" type="button">Новая игра</button>
          <button id="start-leaderboard" type="button">Таблица лидеров</button>
          <button id="start-settings" type="button">Настройка</button>
        </div>
        </div>
      </section>
    </main>

    <div id="game-over-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h2>Время вышло</h2>
        <p id="final-score">Ваш счёт: 0</p>
        <div class="modal-actions">
          <button id="menu-new-game" type="button">Новая игра</button>
          <button id="menu-exit-menu" type="button">Выйти в меню</button>
          <button id="menu-settings" type="button">Настройки</button>
        </div>
      </div>
    </div>

    <div id="settings-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h2>Настройки</h2>
        <div class="settings-row">
          <span>Звук в игре</span>
          <button id="sound-toggle" type="button">Включен</button>
        </div>
        <div class="modal-actions">
          <button id="dev-channel" type="button">Заказать приложение</button>
          <button id="settings-close" type="button">Закрыть</button>
        </div>
      </div>
    </div>

    <div id="auth-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h2>Вход</h2>
        <p>Для сохранения прогресса авторизуйтесь через Telegram.</p>
        <p id="auth-status" class="auth-status" aria-live="polite"></p>
        <div class="modal-actions">
          <button id="auth-login" type="button">Войти через Telegram</button>
        </div>
      </div>
    </div>

    <div id="profile-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h2>Профиль</h2>
        <p>Заполните профиль для таблицы лидеров.</p>
        <label for="profile-name" class="profile-label">Имя</label>
        <input id="profile-name" class="profile-input" type="text" maxlength="24" placeholder="Введите имя" />
        <span class="profile-label">Аватар</span>
        <div id="avatar-picker" class="avatar-picker">
          <button class="avatar-option" type="button" data-avatar="gold">
            <img src="./assets/gold.png" alt="Аватар gold" />
          </button>
          <button class="avatar-option" type="button" data-avatar="hookah">
            <img src="./assets/hookah1.png" alt="Аватар hookah" />
          </button>
          <button class="avatar-option" type="button" data-avatar="steam">
            <img src="./assets/steam.png" alt="Аватар steam" />
          </button>
          <button class="avatar-option" type="button" data-avatar="cole">
            <img src="./assets/cole.png" alt="Аватар cole" />
          </button>
        </div>
        <p id="profile-status" class="auth-status" aria-live="polite"></p>
        <div class="modal-actions">
          <button id="profile-save" type="button">Сохранить профиль</button>
        </div>
      </div>
    </div>

    <template id="tile-template">
      <button class="tile" type="button" aria-label="Фишка">
        <span class="gem"></span>
        <span class="special-mark"></span>
      </button>
    </template>

    <script>
      window.__SUPABASE_URL__ = 'https://tnngitplssufqeqpxuib.supabase.co';
    </script>
    <script src="game.js"></script>
  </body>
</html>
